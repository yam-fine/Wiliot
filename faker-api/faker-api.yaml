  server.js: |
    const http = require('http');
    const fs   = require('fs');

    const PORT = 3000;
    const db   = JSON.parse(fs.readFileSync('/data/db.json', 'utf8'));

    function paginate(arr, query) {
      const limit  = parseInt(query._limit  || arr.length);
      const start  = parseInt(query._start  || 0);
      return arr.slice(start, start + limit);
    }

    function parseQuery(url) {
      const q = {};
      const idx = url.indexOf('?');
      if (idx === -1) return q;
      url.slice(idx + 1).split('&').forEach(part => {
        const [k, v] = part.split('=');
        q[decodeURIComponent(k)] = decodeURIComponent(v || '');
      });
      return q;
    }

    const server = http.createServer((req, res) => {
      const [path, qs] = req.url.split('?');
      const query      = parseQuery(req.url);
      const parts      = path.replace(/^\//, '').split('/');
      const resource   = parts[0];
      const id         = parts[1] ? parseInt(parts[1]) : null;

      res.setHeader('Content-Type', 'application/json');
      res.setHeader('Access-Control-Allow-Origin', '*');

      if (!db[resource]) {
        res.writeHead(404);
        return res.end(JSON.stringify({ error: 'Resource not found' }));
      }

      if (id !== null && !isNaN(id)) {
        const item = db[resource].find(r => r.id === id);
        if (!item) { res.writeHead(404); return res.end(JSON.stringify({ error: 'Not found' })); }
        return res.end(JSON.stringify(item));
      }

      res.writeHead(200);
      res.end(JSON.stringify(paginate(db[resource], query)));
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(`faker-api running on port ${PORT}`);
      console.log('Available routes: ' + Object.keys(db).map(k => `GET /${k}`).join(', '));
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faker-api
  namespace: data-pipeline
  labels:
    app: faker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faker-api
  template:
    metadata:
      labels:
        app: faker-api
    spec:
      containers:
        - name: faker-api
          image: node:18-alpine
          command: ["node", "/data/server.js"]
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /users
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /users
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          configMap:
            name: faker-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: faker-api
  namespace: data-pipeline
  labels:
    app: faker-api
spec:
  type: ClusterIP
  selector:
    app: faker-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
